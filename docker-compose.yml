services:
  dashboard:
    build:
      context: .
      args:
        VERSION: ${VERSION:-dev}
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data/db
      - ./users:/data/users
    environment:
      - ADDR=:8080
      - IDEAS_PATH=/data/ideas.md
      - UPLOADS_DIR=/data/uploads
      - PERSONAL_PATH=/data/db/personal.md
      - FAMILY_PATH=/data/db/family.md
      - MAINTENANCE_PATH=/data/db/maintenance.md
      - HOUSE_PROJECTS_PATH=/data/db/house-projects.md
      - DB_PATH=/data/db/dashboard.db
      - DASHBOARD_API_TOKEN=${DASHBOARD_API_TOKEN}
      - DASHBOARD_PASSWORD_HASH=${DASHBOARD_PASSWORD_HASH}
      - SESSION_LIFETIME=${SESSION_LIFETIME:-720h}
      - DASHBOARD_SECURE_COOKIES=${DASHBOARD_SECURE_COOKIES:-true}
      - USER_DATA_DIR=/data/users
      - DASHBOARD_TIMEZONE=${DASHBOARD_TIMEZONE:-Australia/Sydney}
