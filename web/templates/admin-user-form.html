{{define "content"}}
<nav class="breadcrumb" aria-label="Breadcrumb"><a href="/admin/users">admin / users</a> / {{if eq .FormMode "edit"}}edit{{else}}new{{end}}</nav>
<h1>{{if eq .FormMode "edit"}}Edit User{{else}}New User{{end}}</h1>

<div class="admin-form-card">
    {{if .Error}}<div class="form-error mb-sm">{{.Error}}</div>{{end}}
    <p class="required-note">* Required</p>

    {{if eq .FormMode "edit"}}
    <form class="admin-form" method="POST" action="/admin/users/{{.EditUserID}}/edit">
        <div class="form-group">
            <label for="first_name">First Name</label>
            <input type="text" name="first_name" id="first_name" class="form-input" value="{{if .EditUser}}{{.EditUser.FirstName}}{{else}}{{.FormFirstName}}{{end}}" placeholder="Optional">
        </div>
        <div class="form-group">
            <label for="email">Email<span class="required-indicator">*</span></label>
            <input type="email" name="email" id="email" class="form-input" value="{{if .EditUser}}{{.EditUser.Email}}{{else}}{{.FormEmail}}{{end}}" required>
        </div>
        <div class="form-group">
            <label for="role">Role<span class="required-indicator">*</span></label>
            <select name="role" id="role" class="form-select">
                <option value="user" {{if and .EditUser (eq .EditUser.Role "user")}}selected{{end}}>user</option>
                <option value="admin" {{if and .EditUser (eq .EditUser.Role "admin")}}selected{{end}}>admin</option>
            </select>
        </div>
        <button type="submit" class="form-btn">Save</button>
    </form>
    {{else}}
    <form class="admin-form" method="POST" action="/admin/users/new">
        <div class="form-group">
            <label for="first_name">First Name</label>
            <input type="text" name="first_name" id="first_name" class="form-input" value="{{.FormFirstName}}" placeholder="Optional">
        </div>
        <div class="form-group">
            <label for="email">Email<span class="required-indicator">*</span></label>
            <input type="email" name="email" id="email" class="form-input" value="{{.FormEmail}}" required autofocus>
        </div>
        <div class="form-group">
            <label for="password">Password<span class="required-indicator">*</span></label>
            <input type="password" name="password" id="password" class="form-input" required>
        </div>
        <div class="form-group">
            <label for="role">Role<span class="required-indicator">*</span></label>
            <select name="role" id="role" class="form-select">
                <option value="user" {{if eq .FormRole "user"}}selected{{end}}>user</option>
                <option value="admin" {{if eq .FormRole "admin"}}selected{{end}}>admin</option>
            </select>
        </div>
        <button type="submit" class="form-btn">Create</button>
    </form>
    {{end}}
</div>
{{end}}
