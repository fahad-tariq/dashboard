<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{.Title}} - Dashboard</title>
    <link rel="stylesheet" href="/static/theme.css">
    <script>
        (function() {
            var t = localStorage.getItem('theme');
            if (t) document.documentElement.setAttribute('data-theme', t);
        })();
    </script>
    <script src="/static/htmx.min.js"></script>
    <script src="/static/htmx-sse.js"></script>
</head>
<body hx-ext="sse" sse-connect="/events">
    <nav class="nav">
        <a href="/" class="nav-brand">dash&gt;_</a>
        <div class="nav-links">
            <a href="/">projects</a>
            <a href="/ideas">ideas</a>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn" title="Toggle theme"></button>
    </nav>
    <main class="container">
        {{template "content" .}}
    </main>
    <script>
        function getTheme() {
            return document.documentElement.getAttribute('data-theme') || 'dark';
        }
        function setLabel() {
            document.getElementById('theme-btn').textContent = getTheme() === 'dark' ? '☀' : '☽';
        }
        function toggleTheme() {
            var next = getTheme() === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            setLabel();
        }
        setLabel();
    </script>
</body>
</html>
