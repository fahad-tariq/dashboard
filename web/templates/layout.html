<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{.Title}} - dash</title>
    <link rel="stylesheet" href="/static/theme.css">
    <script>
        (function() {
            var t = localStorage.getItem('theme');
            if (t) document.documentElement.setAttribute('data-theme', t);
        })();
    </script>
    <script src="/static/htmx.min.js"></script>
    <script src="/static/htmx-sse.js"></script>
</head>
<body hx-ext="sse" sse-connect="/events">
    <nav class="nav">
        <a href="/" class="nav-brand">dash&gt;_</a>
        <div class="nav-links">
            <a href="/">home</a>
            <a href="/personal">personal</a>
            <a href="/family">family</a>
            <a href="/goals">goals</a>
            <a href="/ideas">ideas</a>
            <a href="/exploration">exploration</a>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn" title="Toggle theme"></button>
        {{if authEnabled}}{{if .UserName}}{{if .IsAdmin}}<a href="/admin/users" class="nav-user nav-user-link" title="Admin">{{.UserName}}</a>{{else}}<a href="/account/password" class="nav-user nav-user-link" title="Change password">{{.UserName}}</a>{{end}}{{end}}<form method="POST" action="/logout" style="margin:0;display:inline"><button type="submit" class="theme-toggle" title="Logout">logout</button></form>{{end}}
    </nav>
    <main class="container">
        {{if .FlashMsg}}<div class="flash-msg">{{.FlashMsg}}</div>{{end}}
        {{template "content" .}}
    </main>
    <script>
        function getTheme() {
            return document.documentElement.getAttribute('data-theme') || 'dark';
        }
        function setLabel() {
            document.getElementById('theme-btn').textContent = getTheme() === 'dark' ? '☀' : '☽';
        }
        function toggleTheme() {
            var next = getTheme() === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            setLabel();
        }
        setLabel();
        (function() {
            var path = window.location.pathname;
            document.querySelectorAll('.nav-links a').forEach(function(a) {
                var href = a.getAttribute('href');
                if (href === path || (href === '/' && path === '/')) {
                    a.classList.add('nav-active');
                } else if (href !== '/' && path.startsWith(href)) {
                    a.classList.add('nav-active');
                }
            });
        })();
    </script>
    {{if authEnabled}}<script>
        (function() {
            var navigating = false;
            window.addEventListener('beforeunload', function() { navigating = true; });
            document.body.addEventListener('htmx:sseError', function() {
                if (navigating) return;
                window.location.href = '/login?next=' + window.location.pathname;
            });
        })();
    </script>{{end}}
    <script src="/static/tracker.js"></script>
    <script src="/static/upload.js"></script>
</body>
</html>
