{{define "content"}}
<div class="breadcrumb">account</div>
<h1>Account Settings</h1>

{{if .FlashMsg}}<div class="flash-msg" style="margin-bottom: 0.75rem;">{{.FlashMsg}}</div>{{end}}

<div class="admin-form-card">
    <h2 style="margin: 0 0 0.75rem 0; font-size: 1rem;">Display Name</h2>
    {{if .NameError}}<div class="form-error" style="margin-bottom: 0.75rem;">{{.NameError}}</div>{{end}}
    <form class="admin-form" method="POST" action="/account/name">
        <div class="form-group">
            <label for="first_name">First Name</label>
            <input type="text" name="first_name" id="first_name" class="form-input" value="{{.FirstName}}" placeholder="Optional" autofocus>
        </div>
        <button type="submit" class="form-btn">Save Name</button>
    </form>
</div>

<div class="admin-form-card" style="margin-top: 1.5rem;">
    <h2 style="margin: 0 0 0.75rem 0; font-size: 1rem;">Change Password</h2>
    {{if .PasswordError}}<div class="form-error" style="margin-bottom: 0.75rem;">{{.PasswordError}}</div>{{end}}
    <form class="admin-form" method="POST" action="/account/password"
          onsubmit="if(this.password.value !== this.confirm.value){alert('Passwords do not match.');return false;}">
        <div class="form-group">
            <label for="password">New Password</label>
            <input type="password" name="password" id="password" class="form-input" required>
        </div>
        <div class="form-group">
            <label for="confirm">Confirm Password</label>
            <input type="password" name="confirm" id="confirm" class="form-input" required>
        </div>
        <button type="submit" class="form-btn">Update Password</button>
    </form>
</div>
{{end}}
