{{define "content"}}
{{if .SelfService}}
<nav class="breadcrumb" aria-label="Breadcrumb">account / password</nav>
<h1>Change Password</h1>
{{else}}
<nav class="breadcrumb" aria-label="Breadcrumb"><a href="/admin/users">admin / users</a> / password</nav>
<h1>Reset Password for {{.EditUser.Email}}</h1>
{{end}}

<div class="admin-form-card">
    {{if .Error}}<div class="form-error" style="margin-bottom: 0.75rem;">{{.Error}}</div>{{end}}
    {{if .FlashMsg}}<div class="flash-msg" style="margin-bottom: 0.75rem;">{{.FlashMsg}}</div>{{end}}

    <form class="admin-form" method="POST" action="{{if .SelfService}}/account/password{{else}}/admin/users/{{.EditUserID}}/password{{end}}" id="admin-pw-form">
        <div class="form-group">
            <label for="password">New Password<span class="required-indicator">*</span></label>
            <input type="password" name="password" id="password" class="form-input" required autofocus>
        </div>
        <div class="form-group">
            <label for="confirm">Confirm Password<span class="required-indicator">*</span></label>
            <input type="password" name="confirm" id="confirm" class="form-input" required>
        </div>
        <div class="form-error mb-sm" id="admin-pw-error" style="display:none">Passwords do not match.</div>
        <button type="submit" class="form-btn">{{if .SelfService}}Update Password{{else}}Reset Password{{end}}</button>
    </form>
    <script>
    (function() {
        var form = document.getElementById('admin-pw-form');
        var errDiv = document.getElementById('admin-pw-error');
        form.addEventListener('submit', function(e) {
            if (form.password.value !== form.confirm.value) {
                e.preventDefault();
                errDiv.style.display = 'block';
            } else {
                errDiv.style.display = 'none';
            }
        });
    })();
    </script>
</div>
{{end}}
