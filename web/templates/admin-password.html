{{define "content"}}
{{if .SelfService}}
<div class="breadcrumb">account / password</div>
<h1>Change Password</h1>
{{else}}
<div class="breadcrumb"><a href="/admin/users">admin / users</a> / password</div>
<h1>Reset Password for {{.EditUser.Email}}</h1>
{{end}}

<div class="admin-form-card">
    {{if .Error}}<div class="form-error" style="margin-bottom: 0.75rem;">{{.Error}}</div>{{end}}
    {{if .FlashMsg}}<div class="flash-msg" style="margin-bottom: 0.75rem;">{{.FlashMsg}}</div>{{end}}

    <form class="admin-form" method="POST" action="{{if .SelfService}}/account/password{{else}}/admin/users/{{.EditUserID}}/password{{end}}"
          onsubmit="if(this.password.value !== this.confirm.value){alert('Passwords do not match.');return false;}">
        <div class="form-group">
            <label for="password">New Password</label>
            <input type="password" name="password" id="password" class="form-input" required autofocus>
        </div>
        <div class="form-group">
            <label for="confirm">Confirm Password</label>
            <input type="password" name="confirm" id="confirm" class="form-input" required>
        </div>
        <button type="submit" class="form-btn">{{if .SelfService}}Update Password{{else}}Reset Password{{end}}</button>
    </form>
</div>
{{end}}
